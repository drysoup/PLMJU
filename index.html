<style>

.ctrl-btn:active{opacity:.8}
.ctrl-outline{border:1px solid #334155!important;background:#0f172a;color:#94a3b8}
.quick-bar{width:100%}
.quick-title{font-size:10px;color:#475569;text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px;text-align:center}
.quick-row{display:flex;gap:4px}
.quick-btn{flex:1;padding:8px 0;border-radius:6px;cursor:pointer;font-size:10px;font-weight:600;font-family:inherit}
@keyframes pulse{from{opacity:1;transform:scale(1)}to{opacity:.7;transform:scale(1.05)}}
</style>

<body>

<div class="header">
  <h1>5/3/1 POWERBUILDING</h1>
  <p>Strong & Aesthetic • Leg Focused • Fat Loss Conditioning</p>
</div>

<div class="tabs" id="main-tabs"></div>
<div id="tab-maxes" class="tab-content active"></div>
<div id="tab-program" class="tab-content"></div>
<div id="tab-timer" class="tab-content"></div>
<div id="tab-legs" class="tab-content"></div>
<div class="footer">Training Max = 90% of 1RM • Increase TM by 2.5 kg upper / 5 kg lower each cycle</div>

<script>
// ===== DATA =====
const lifts=["squat","bench","deadlift","ohp"];
const liftNames={squat:"Back Squat",bench:"Bench Press",deadlift:"Deadlift",ohp:"Overhead Press"};
const liftColors={squat:"#ef4444",bench:"#3b82f6",deadlift:"#f59e0b",ohp:"#8b5cf6"};
const dayLabels={squat:"Monday — Squat + Legs",bench:"Tuesday — Bench + Upper",deadlift:"Thursday — Deadlift + Legs",ohp:"Friday — OHP + Upper"};
const weekLabels=[["Week 1","5s"],["Week 2","3s"],["Week 3","5/3/1"],["Week 4","Deload"]];
const schemes=[[[.65,5],[.75,5],[.85,"5+"]],[[.70,3],[.80,3],[.90,"3+"]],[[.75,5],[.85,3],[.95,"1+"]],[[.40,5],[.50,5],[.60,5]]];
const wu=[[.40,5],[.50,5],[.60,3]];
const acc={
  squat:[{t:"Leg Hypertrophy",c:"#ec4899",ex:["Leg Press: 4×12-15","Romanian Deadlift: 3×10-12","Walking Lunges: 3×12 each","Leg Curls: 4×12-15","Leg Extensions: 4×15-20 (slow)","Standing Calf Raises: 5×15-20"]},{t:"Core",c:"#ec4899",ex:["Hanging Leg Raises: 3×12","Ab Wheel Rollouts: 3×10"]}],
  bench:[{t:"Upper Aesthetics",c:"#ec4899",ex:["Barbell Rows: 4×8-10","DB Incline Press: 3×10-12","Lat Pulldown: 4×10-12","Lateral Raises: 4×15-20","Face Pulls: 3×15-20","EZ Bar Curls: 3×10-12","Tricep Pushdowns: 3×12-15"]}],
  deadlift:[{t:"Leg Hypertrophy",c:"#ec4899",ex:["Front Squats: 4×8-10","Bulgarian Split Squats: 3×10 each","Glute-Ham Raises: 4×8-12","Hack Squat: 3×12-15","Adductor Machine: 3×15","Seated Calf Raises: 5×15-20"]},{t:"Core",c:"#ec4899",ex:["Cable Woodchops: 3×12 each","Planks: 3×45-60s"]}],
  ohp:[{t:"Upper Aesthetics",c:"#ec4899",ex:["Weighted Chin-Ups: 4×6-8","DB Shoulder Press: 3×10-12","Cable Rows: 4×10-12","Chest Flyes: 3×12-15","Rear Delt Flyes: 3×15-20","Hammer Curls: 3×10-12","OH Tricep Extension: 3×12-15"]}]
};
const condDays=[
  {day:"Wednesday — Conditioning",color:"#10b981",sections:[{t:"Option A: LISS",ex:["30-45 min incline walk (12-15%, 3.0-3.5 km/h)"]},{t:"Option B: HIIT",ex:["Bike/Rower: 10×30s sprint / 60s rest"]},{t:"Option C: Strongman",ex:["Sled Push: 6-8×40m","Farmer's Walks: 4×60m","Battle Ropes: 4×30s"]},{t:"Bonus Legs",ex:["Sissy Squats: 3×15","Seated Calf Raises: 4×20"]}]},
  {day:"Saturday — Conditioning + Legs",color:"#ec4899",sections:[{t:"Conditioning",ex:["30-40 min Stairmaster, cycling, or swimming"]},{t:"Leg Pump",ex:["Goblet Squats: 3×15","Leg Press (light): 3×20","Nordic Curls: 3×6-8","Calf Raises: 4×20","Hip Thrusts: 3×12-15"]}]}
];
const dayOrder=["squat","bench","cond0","deadlift","ohp","cond1","rest"];
const legPts=["Total weekly leg volume: ~60+ direct sets","Legs trained 3×/week (Mon heavy, Thu moderate, Sat pump)","Calves 3×/week (14+ sets) — calves need FREQUENCY","Progressive overload on squat & deadlift drives the base","BBB 5×10 is the main hypertrophy driver — push weight up over time","Slow eccentrics on leg extensions/curls for extra TUT","Track thigh measurements monthly (mid-thigh, relaxed + flexed)","Eat enough protein — legs won't grow in a severe deficit"];
const volData=[["Quads","~28 sets","Mon + Thu + Sat"],["Hamstrings","~20 sets","Mon + Thu + Sat"],["Glutes","~16 sets","Mon + Thu + Sat"],["Calves","~14 sets","Mon + Thu + Sat"],["Adductors","~6 sets","Thu + Sat"]];
const timerPresets=[
  {label:"Warm-Up",time:60,color:"#64748b",icon:"🔥",desc:"60 seconds"},
  {label:"Working Sets",time:210,color:"#ef4444",icon:"🏋️",desc:"3 min 30s"},
  {label:"BBB",time:90,color:"#10b981",icon:"💪",desc:"90 seconds"},
  {label:"Accessories",time:75,color:"#ec4899",icon:"🎯",desc:"75 seconds"},
  {label:"Custom",time:120,color:"#8b5cf6",icon:"⏱",desc:"Set your own time"}
];

// ===== STATE =====
let maxes={squat:"",bench:"",deadlift:"",ohp:""};
let modes={squat:"direct",bench:"direct",deadlift:"direct",ohp:"direct"};
let estInputs={squat:{w:"",r:""},bench:{w:"",r:""},deadlift:{w:"",r:""},ohp:{w:"",r:""}};
let activeWeek=0,expandedDay=null,currentTab="maxes";
let timerSel=null,timerCustom=120,timerLeft=0,timerTotal=0,timerRunning=false,timerDone=false,timerIv=null,audioCtx=null;

// ===== PERSISTENCE =====
function saveState(){try{localStorage.setItem("531pwa",JSON.stringify({maxes,modes}))}catch(e){}}
function loadState(){try{const d=JSON.parse(localStorage.getItem("531pwa"));if(d){maxes=d.maxes||maxes;modes=d.modes||modes}}catch(e){}}

// ===== UTILS =====
function r25(v){return Math.round(v/2.5)*2.5}
function getTM(l){const v=parseFloat(maxes[l]);return v>0?r25(v*.9):0}
function pct(tm,p){return tm?r25(tm*p):"—"}
function est1RM(w,r){if(!w||!r||r<1)return 0;if(r===1)return w;return Math.round(w*(1+r/30))}
function fmt(s){const m=Math.floor(s/60),sc=s%60;return m+":"+(sc<10?"0":"")+sc}

// ===== TABS =====
const tabDefs=[["maxes","⚙ Maxes"],["program","Program"],["timer","⏱ Timer"],["legs","Leg Plan"]];
function buildTabs(){
  const c=document.getElementById("main-tabs");c.innerHTML="";
  tabDefs.forEach(([id,label])=>{const b=document.createElement("button");b.className="tab-btn"+(currentTab===id?" active":"");b.textContent=label;b.onclick=()=>switchTab(id);c.appendChild(b)});
}
function switchTab(id){
  currentTab=id;
  document.querySelectorAll(".tab-content").forEach(t=>t.classList.remove("active"));
  document.getElementById("tab-"+id).classList.add("active");
  buildTabs();
  if(id==="program")renderProgram();
  if(id==="timer")renderTimer();
}

// ===== MAXES =====
function buildMaxes(){
  const c=document.getElementById("tab-maxes");let h='<div class="info-box">Enter your <strong>known 1RM</strong> directly, or use the <strong>estimator</strong> — plug in a weight and reps and it\'ll calculate your max. All weights auto-fill.</div>';
  lifts.forEach(l=>{
    const col=liftColors[l],tm=getTM(l),mode=modes[l];
    h+=`<div class="lift-card" style="border:1px solid ${col}44"><div class="lift-header"><div class="lift-bar" style="background:${col}"></div><span class="lift-name" style="color:${col}">${liftNames[l]}</span><span class="lift-tm" style="display:${maxes[l]?"inline":"none"}">TM: <strong>${tm} kg</strong></span></div>`;
    h+=`<div class="mode-toggle"><button class="mode-btn" style="border:1px solid ${mode==="direct"?col:"#334155"};color:${mode==="direct"?col:"#64748b"};background:${mode==="direct"?col+"22":"transparent"}" onclick="setMode('${l}','direct')">I know my 1RM</button><button class="mode-btn" style="border:1px solid ${mode==="estimate"?col:"#334155"};color:${mode==="estimate"?col:"#64748b"};background:${mode==="estimate"?col+"22":"transparent"}" onclick="setMode('${l}','estimate')">Estimate from reps</button></div>`;
    if(mode==="direct"){h+=`<div class="input-row"><label>1RM (kg):</label><input type="number" inputmode="decimal" placeholder="e.g. 140" value="${maxes[l]}" oninput="setMax('${l}',this.value)"></div>`}
    else{
      h+=`<div class="est-row"><div class="est-col"><label>Weight (kg)</label><input type="number" inputmode="decimal" placeholder="e.g. 100" value="${estInputs[l].w}" oninput="setEst('${l}','w',this.value)"></div><div class="est-col"><label>Reps</label><input type="number" inputmode="numeric" placeholder="e.g. 8" value="${estInputs[l].r}" oninput="setEst('${l}','r',this.value)"></div></div>`;
      const eVal=estInputs[l].w&&estInputs[l].r?" → "+est1RM(parseFloat(estInputs[l].w),parseInt(estInputs[l].r))+" kg":"";
      h+=`<button class="calc-btn" style="background:linear-gradient(135deg,${col},${col}cc)" onclick="calcEst('${l}')">Calculate 1RM${eVal}</button>`;
    }
    h+=`<div class="result-text" style="display:${maxes[l]?"block":"none"}">1RM: <strong>${maxes[l]} kg</strong> → TM (90%): <strong style="color:${col}">${tm} kg</strong></div></div>`;
  });
  h+=`<button class="go-btn${Object.values(maxes).some(v=>v)?" show":""}" onclick="switchTab('program')">View Program with My Numbers →</button>`;
  c.innerHTML=h;
}
function setMax(l,v){maxes[l]=v;saveState();buildMaxes()}
function setEst(l,k,v){estInputs[l][k]=v;buildMaxes()}
function setMode(l,m){modes[l]=m;saveState();buildMaxes()}
function calcEst(l){const{w,r}=estInputs[l];const e=est1RM(parseFloat(w),parseInt(r));if(e>0){maxes[l]=String(e);saveState();buildMaxes()}}

// ===== PROGRAM =====
function renderProgram(){
  const c=document.getElementById("tab-program");let h="";
  const hasAny=Object.values(maxes).some(v=>v);
  if(!hasAny)h+=`<div class="warning-box" onclick="switchTab('maxes')">⚠ No maxes entered — tap here to add your numbers</div>`;
  h+='<div class="week-tabs">';
  weekLabels.forEach(([name,sub],i)=>{h+=`<button class="week-btn${i===activeWeek?" active":""}" onclick="setWeek(${i})">${name}<span>${sub}</span></button>`});
  h+='</div>';

  dayOrder.forEach(key=>{
    if(key==="rest"){
      h+=`<div class="day-card"><div class="day-header" style="cursor:default"><div class="day-bar" style="background:#6b7280"></div><div class="day-info"><div>Sunday — REST</div><div class="day-sub">Foam roll, stretch, light walk</div></div></div></div>`;
      return;
    }
    if(key.startsWith("cond")){
      const i=parseInt(key[4]),cd=condDays[i],isOpen=expandedDay===key;
      let body="";
      cd.sections.forEach(s=>{body+=`<div class="section-title" style="color:${cd.color}">${s.t}</div>`;s.ex.forEach(ex=>{body+=`<div class="exercise" style="border-left:2px solid ${cd.color}44">${ex}</div>`})});
      h+=`<div class="day-card" style="${isOpen?"border-color:"+cd.color+"88":""}"><button class="day-header" onclick="toggleDay('${key}')"><div class="day-bar" style="background:${cd.color}"></div><div class="day-info">${cd.day}</div><div class="day-arrow${isOpen?" open":""}">▾</div></button><div class="day-body${isOpen?" open":""}">${body}</div></div>`;
      return;
    }
    const l=key,col=liftColors[l],tm=getTM(l),hasTM=tm>0,ws=schemes[activeWeek],bbbPct=activeWeek===3?.40:.55,bbbSets=activeWeek===3?3:5;
    const topSet=ws[ws.length-1],topW=pct(tm,topSet[0]),isOpen=expandedDay===l;
    let body="";
    body+=`<div class="section-title" style="color:#64748b">Warm-Up <span class="rest-hint">— 60s rest</span></div>`;
    wu.forEach(([p,r])=>{body+=`<div class="exercise" style="border-left:2px solid #334155">${hasTM?pct(tm,p)+" kg":Math.round(p*100)+"%"} × ${r}</div>`});
    body+=`<div class="section-title" style="color:${col}">Working Sets — ${liftNames[l]} <span class="rest-hint">— 3-5 min rest</span></div>`;
    ws.forEach(([p,r],j)=>{const isTop=j===ws.length-1;body+=`<div class="exercise working${isTop?" top-set":""}" style="border-left:2px solid ${col}">${hasTM?'<strong style="color:'+col+'">'+pct(tm,p)+' kg</strong>':Math.round(p*100)+"%"} × ${r}${isTop?'<span class="amrap-note">(AMRAP — beat your log)</span>':""}</div>`});
    body+=`<div class="section-title" style="color:#10b981">BBB Supplemental <span class="rest-hint">— 90s rest</span></div>`;
    body+=`<div class="exercise" style="border-left:2px solid #10b98144">${bbbSets} × 10 @ ${hasTM?"<strong>"+pct(tm,bbbPct)+" kg</strong>":"50-60%"}</div>`;
    acc[l].forEach(sec=>{body+=`<div class="section-title" style="color:${sec.c}">${sec.t} <span class="rest-hint">— 60-90s rest</span></div>`;sec.ex.forEach(ex=>{body+=`<div class="exercise" style="border-left:2px solid ${sec.c}44">${ex}</div>`})});
    h+=`<div class="day-card" style="${isOpen?"border-color:"+col+"88":""}"><button class="day-header" onclick="toggleDay('${l}')"><div class="day-bar" style="background:${col}"></div><div class="day-info"><div>${dayLabels[l]}</div>${hasTM?'<div class="day-sub">Top set: '+topW+' kg × '+topSet[1]+'</div>':''}</div><div class="day-arrow${isOpen?" open":""}">▾</div></button><div class="day-body${isOpen?" open":""}">${body}</div></div>`;
  });
  c.innerHTML=h;
}
function setWeek(i){activeWeek=i;expandedDay=null;renderProgram()}
function toggleDay(id){expandedDay=expandedDay===id?null:id;renderProgram()}

// ===== TIMER =====
function playBeep(f,d){try{if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();const o=audioCtx.createOscillator(),g=audioCtx.createGain();o.connect(g);g.connect(audioCtx.destination);o.frequency.value=f;o.type="sine";g.gain.setValueAtTime(.3,audioCtx.currentTime);g.gain.exponentialRampToValueAtTime(.01,audioCtx.currentTime+d);o.start(audioCtx.currentTime);o.stop(audioCtx.currentTime+d)}catch(e){}}
function playDone(){playBeep(1046,.3);setTimeout(()=>playBeep(1318,.3),150);setTimeout(()=>playBeep(1568,.5),300)}
function startTimer(idx){clearInterval(timerIv);const t=idx===4?timerCustom:timerPresets[idx].time;timerSel=idx;timerTotal=t;timerLeft=t;timerRunning=true;timerDone=false;runTick();renderTimer()}
function runTick(){clearInterval(timerIv);timerIv=setInterval(()=>{if(timerLeft<=4&&timerLeft>1)playBeep(880,.15);if(timerLeft<=1){clearInterval(timerIv);timerRunning=false;timerDone=true;timerLeft=0;playDone();renderTimer();return}timerLeft--;renderTimer()},1000)}
function pauseTimer(){timerRunning=false;clearInterval(timerIv);renderTimer()}
function resumeTimer(){if(timerLeft>0){timerRunning=true;runTick();renderTimer()}}
function resetTimer(){clearInterval(timerIv);timerRunning=false;timerDone=false;timerLeft=timerTotal;renderTimer()}
function stopTimer(){clearInterval(timerIv);timerRunning=false;timerDone=false;timerSel=null;timerLeft=0;renderTimer()}
function addTime(s){timerLeft+=s;timerTotal+=s;renderTimer()}
function setCustomTime(v){timerCustom=Number(v);renderTimer()}

function renderTimer(){
  const c=document.getElementById("tab-timer");let h="";
  if(timerSel===null){
    h+='<div class="timer-presets">';
    timerPresets.forEach((p,i)=>{
      if(i<4){h+=`<button class="preset-btn" style="border:1px solid ${p.color}44" onclick="startTimer(${i})"><span class="preset-icon">${p.icon}</span><div class="preset-info"><div>${p.label}</div><div class="preset-sub">${p.desc}</div></div><div class="preset-time" style="color:${p.color}">${fmt(p.time)}</div></button>`}
      else{
        h+=`<button class="preset-btn" style="border:1px solid ${p.color}44;border-radius:8px 8px 0 0;cursor:default"><span class="preset-icon">${p.icon}</span><div class="preset-info"><div>${p.label}</div><div class="preset-sub">${p.desc}</div></div></button>`;
        h+=`<div class="custom-slider"><input type="range" min="15" max="600" step="15" value="${timerCustom}" oninput="setCustomTime(this.value)" style="accent-color:${p.color}"><span style="font-size:18px;font-weight:700;color:${p.color};min-width:52px;text-align:right">${fmt(timerCustom)}</span><button style="padding:10px 20px;border:none;border-radius:6px;cursor:pointer;background:${p.color};color:#fff;font-size:13px;font-weight:700;font-family:inherit" onclick="startTimer(4)">GO</button></div>`;
      }
    });
    h+="</div>";
  }else{
    const p=timerPresets[timerSel],col=p.color,prog=timerTotal>0?timerLeft/timerTotal:0,low=timerLeft<=5&&timerLeft>0&&timerRunning;
    const circ=2*Math.PI*105,off=circ*(1-(timerDone?1:prog)),strokeCol=timerDone?"#10b981":low?"#ef4444":col;
    h+=`<div class="timer-display"><div class="timer-label"><span style="font-size:18px">${p.icon}</span><span style="font-size:14px;font-weight:700;color:${col}">${p.label}</span></div>`;
    h+=`<div class="circle-wrap"><svg width="240" height="240"><circle cx="120" cy="120" r="105" fill="none" stroke="#1e293b" stroke-width="8"/><circle cx="120" cy="120" r="105" fill="none" stroke="${strokeCol}" stroke-width="8" stroke-linecap="round" stroke-dasharray="${circ}" stroke-dashoffset="${off}" style="transition:stroke-dashoffset .3s linear,stroke .3s"/></svg><div class="circle-center">`;
    if(timerDone){h+=`<div style="font-size:40px;margin-bottom:4px">✅</div><div style="font-size:18px;font-weight:700;color:#10b981">GO TIME!</div>`}
    else{h+=`<div class="timer-digits" style="color:${low?"#ef4444":"#e2e8f0"};${low?"animation:pulse .5s ease-in-out infinite alternate":""}">${fmt(timerLeft)}</div><div class="timer-total">of ${fmt(timerTotal)}</div>`}
    h+=`</div></div>`;
    if(!timerDone){h+=`<div class="add-btns">`;[15,30,60].forEach(s=>{h+=`<button class="add-btn" onclick="addTime(${s})">+${s}s</button>`});h+=`</div>`}
    h+=`<div class="ctrl-btns">`;
    if(timerDone){h+=`<button class="ctrl-btn" style="background:${col};color:#fff;border:none" onclick="resetTimer();resumeTimer()">Restart</button><button class="ctrl-btn ctrl-outline" onclick="stopTimer()">Back</button>`}
    else{
      if(timerRunning){h+=`<button class="ctrl-btn" style="background:#f59e0b;color:#0f172a;border:none" onclick="pauseTimer()">Pause</button>`}
      else{h+=`<button class="ctrl-btn" style="background:${col};color:#fff;border:none" onclick="resumeTimer()">Resume</button>`}
      h+=`<button class="ctrl-btn ctrl-outline" onclick="resetTimer()">Reset</button><button class="ctrl-btn ctrl-outline" onclick="stopTimer()">Back</button>`;
    }
    h+=`</div>`;
    if(!timerDone){h+=`<div class="quick-bar"><div class="quick-title">Quick Switch</div><div class="quick-row">`;timerPresets.slice(0,4).forEach((pr,i)=>{const sel=timerSel===i;h+=`<button class="quick-btn" style="border:1px solid ${sel?pr.color:"#334155"};background:${sel?pr.color+"22":"#0f172a"};color:${sel?pr.color:"#64748b"}" onclick="startTimer(${i})">${pr.icon} ${pr.label.split(" ")[0]}</button>`});h+=`</div></div>`}
    h+=`</div>`;
  }
  c.innerHTML=h;
}

// ===== LEGS =====
function buildLegs(){
  const c=document.getElementById("tab-legs");
  let h=`<div class="leg-box"><h3>🦵 Leg Growth Strategy: +3 Inches/Year</h3>`;
  legPts.forEach(p=>{h+=`<div class="leg-point"><span>→</span><span>${p}</span></div>`});
  h+=`</div><div class="vol-box"><div class="vol-title">Weekly Volume Breakdown</div>`;
  volData.forEach(([m,s,d])=>{h+=`<div class="vol-row"><span class="vol-muscle">${m}</span><span class="vol-detail">${s} • ${d}</span></div>`});
  h+=`</div>`;c.innerHTML=h;
}

// ===== SERVICE WORKER (inline) =====
if('serviceWorker' in navigator){
  const swCode=`self.addEventListener('install',e=>{self.skipWaiting()});self.addEventListener('activate',e=>{e.waitUntil(clients.claim())});self.addEventListener('fetch',e=>{e.respondWith(caches.match(e.request).then(r=>r||fetch(e.request).then(res=>{if(res.status===200){const c=res.clone();caches.open('531pwa-v1').then(cache=>cache.put(e.request,c))}return res}).catch(()=>new Response('Offline',{status:503}))))})`;
  const blob=new Blob([swCode],{type:'application/javascript'});
  navigator.serviceWorker.register(URL.createObjectURL(blob)).catch(()=>{});
}

// ===== INIT =====
loadState();buildTabs();buildMaxes();renderProgram();renderTimer();buildLegs();
</script>
