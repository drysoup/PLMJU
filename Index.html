// ===== UTILS =====
const r25=v=>Math.round(v/2.5)*2.5;
const gTM=l=>{const v=parseFloat(mx[l]);return v>0?r25(v*.9):0};
const pc=(tm,p)=>tm?r25(tm*p):"—";
const e1=(w,r)=>{if(!w||!r||r<1)return 0;return r===1?w:Math.round(w*(1+r/30))};
const fm=s=>{const m=Math.floor(s/60),sc=s%60;return m+":"+(sc<10?"0":"")+sc};
const fD=d=>new Date(d).toLocaleDateString("en-GB",{day:"numeric",month:"short"});

// ===== AUDIO =====
function bpk(f,d){try{if(!actx)actx=new(window.AudioContext||window.webkitAudioContext)();const o=actx.createOscillator(),g=actx.createGain();o.connect(g);g.connect(actx.destination);o.frequency.value=f;o.type="sine";g.gain.setValueAtTime(.3,actx.currentTime);g.gain.exponentialRampToValueAtTime(.01,actx.currentTime+d);o.start(actx.currentTime);o.stop(actx.currentTime+d)}catch(e){}}
function playDone(){bpk(1046,.3);setTimeout(()=>bpk(1318,.3),150);setTimeout(()=>bpk(1568,.5),300)}

// ===== TABS =====
const TBD=[["max","⚙ Maxes"],["prog","Program"],["legs","Legs"]];
function bT(){const c=document.getElementById("tabs");c.innerHTML="";TBD.forEach(([id,lb])=>{const b=document.createElement("button");b.className="tb"+(ct===id?" on":"");b.textContent=lb;b.onclick=()=>sT(id);c.appendChild(b)})}
function sT(id){ct=id;document.querySelectorAll(".tc").forEach(t=>t.classList.remove("on"));document.getElementById("t-"+id).classList.add("on");bT();if(id==="prog")rP()}

// ===== TIMER ENGINE =====
function startTimer(type,seconds){
  clearInterval(tiv);
  tType=type;ttot=seconds;tl=seconds;trun=true;tdone=false;tActive=true;tExpanded=false;
  runTick();rFB();
}
function runTick(){
  clearInterval(tiv);
  tiv=setInterval(()=>{
    if(tl<=4&&tl>1){bpk(880,.15);showOverlay(tl-1)}
    if(tl<=1){clearInterval(tiv);trun=false;tdone=true;tl=0;playDone();showGoOverlay();rFB();return}
    tl--;rFB();
  },1000);
}
function pauseT(){trun=false;clearInterval(tiv);rFB()}
function resumeT(){if(tl>0){trun=true;runTick();rFB()}}
function stopT(){clearInterval(tiv);trun=false;tdone=false;tActive=false;tl=0;tExpanded=false;rFB();hideOverlay()}
function addT(s){tl+=s;ttot+=s;rFB()}
function switchT(type){startTimer(type,REST[type])}

// ===== OVERLAY =====
function showOverlay(n){
  const o=document.getElementById("overlay");
  o.style.opacity="1";o.classList.add("show");
  o.style.background=n>0?"#ef4444dd":"#10b981dd";
  o.innerHTML=`<div class="ov-num" style="color:#fff;animation:flashIn .2s">${n>0?n:"GO!"}</div><div class="ov-label" style="color:#ffffffcc">${n>0?"GET READY":"NEXT SET"}</div>`;
}
function showGoOverlay(){
  const o=document.getElementById("overlay");
  o.style.opacity="1";o.classList.add("show");
  o.style.background="#10b981dd";
  o.innerHTML=`<div class="ov-num" style="color:#fff;animation:flashIn .2s">GO!</div><div class="ov-label" style="color:#ffffffcc">NEXT SET</div>`;
  setTimeout(hideOverlay,1500);
}
function hideOverlay(){const o=document.getElementById("overlay");o.style.opacity="0";o.classList.remove("show")}

// ===== FLOATING BAR =====
function rFB(){
  const el=document.getElementById("fbar");
  if(!tActive){el.style.display="none";return}
  el.style.display="block";
  const col=RCOLS[tType]||"#8b5cf6";
  const label=RNAMES[tType]||"Rest";
  if(tdone){
    el.innerHTML=`<div class="fbar-inner" style="background:linear-gradient(135deg,#10b981,#059669)" onclick="stopT()"><div class="fbar-time" style="color:#fff">✅</div><div class="fbar-label" style="color:#fff">Done! Tap to dismiss<div class="fbar-sub">Start your next set</div></div></div>`;
    return;
  }
  const low=tl<=5&&tl>0;
  el.innerHTML=`<div class="fbar-inner" style="background:linear-gradient(135deg,${low?"#ef4444,#dc2626":col+","+col+"cc"})" onclick="tExpanded=true;rTM()">
    <div class="fbar-time" style="color:#fff;${low?"animation:pulse .5s ease-in-out infinite alternate":""}">${fm(tl)}</div>
    <div class="fbar-label" style="color:#fff">${label}<div class="fbar-sub">${fm(ttot)} total · tap to expand</div></div>
    <button class="fbar-btn" style="background:#ffffff33;color:#fff" onclick="event.stopPropagation();${trun?"pauseT()":"resumeT()"}">${trun?"⏸":"▶"}</button>
    <button class="fbar-btn" style="background:#ffffff22;color:#fff" onclick="event.stopPropagation();stopT()">✕</button>
  </div>`;
}

// ===== EXPANDED TIMER MODAL =====
function rTM(){
  const el=document.getElementById("tmodal");
  if(!tExpanded||!tActive){el.classList.remove("show");el.innerHTML="";return}
  el.classList.add("show");
  const col=RCOLS[tType]||"#8b5cf6";
  const label=RNAMES[tType]||"Rest";
  const pr=ttot>0?tl/ttot:0,low=tl<=5&&tl>0&&trun;
  const cr=2*Math.PI*95,of=cr*(1-(tdone?1:pr)),sc=tdone?"#10b981":low?"#ef4444":col;
  let h=`<div style="display:flex;align-items:center;gap:6px;background:#1e293b;border-radius:6px;padding:6px 12px"><span style="font-size:13px;font-weight:700;color:${col}">${label}</span></div>`;
  h+=`<div class="cw"><svg width="220" height="220"><circle cx="110" cy="110" r="95" fill="none" stroke="#1e293b" stroke-width="7"/><circle cx="110" cy="110" r="95" fill="none" stroke="${sc}" stroke-width="7" stroke-linecap="round" stroke-dasharray="${cr}" stroke-dashoffset="${of}" style="transition:stroke-dashoffset .3s linear,stroke .3s"/></svg><div class="cc">`;
  if(tdone){h+=`<div style="font-size:36px">✅</div><div style="font-size:16px;font-weight:700;color:#10b981;margin-top:4px">GO!</div>`}
  else{h+=`<div class="tn" style="color:${low?"#ef4444":"#e2e8f0"};${low?"animation:pulse .5s ease-in-out infinite alternate":""}">${fm(tl)}</div><div class="tt">of ${fm(ttot)}</div>`}
  h+=`</div></div>`;
  if(!tdone){h+=`<div class="ab">`;[15,30,60].forEach(s=>{h+=`<button class="adb" onclick="addT(${s});rTM()">+${s}s</button>`});h+=`</div>`}
  h+=`<div class="ctb">`;
  if(tdone){h+=`<button class="ct" style="background:${col};color:#fff;border:none" onclick="startTimer('${tType}',${REST[tType]});rTM()">Again</button>`}
  else if(trun){h+=`<button class="ct" style="background:#f59e0b;color:#0f172a;border:none" onclick="pauseT();rTM()">Pause</button>`}
  else{h+=`<button class="ct" style="background:${col};color:#fff;border:none" onclick="resumeT();rTM()">Resume</button>`}
  h+=`<button class="ct co" onclick="tExpanded=false;rTM()">Minimize</button>`;
  h+=`<button class="ct co" onclick="stopT();rTM()">Stop</button></div>`;
  // Quick switch
  if(!tdone){h+=`<div class="qb"><div class="qt">Switch Timer</div><div class="qr">`;
  ["warmup","working","bbb","compound","isolation"].forEach(t=>{const s=tType===t;h+=`<button class="qn" style="border:1px solid ${s?RCOLS[t]:"#334155"};background:${s?RCOLS[t]+"22":"#0f172a"};color:${s?RCOLS[t]:"#64748b"}" onclick="switchT('${t}');rTM()">${RNAMES[t].split(" ")[0]}</button>`});
  h+=`</div></div>`}
  el.innerHTML=h;
}

// ===== AUTO-START TIMER ON SET CHECKOFF =====
function getRestType(lift,setIdx){
  const ws=SC[aw],bs=aw===3?3:5,wuLen=WU.length,wsLen=ws.length;
  if(setIdx<wuLen)return "warmup";
  if(setIdx<wuLen+wsLen)return "working";
  if(setIdx<wuLen+wsLen+bs)return "bbb";
  // Accessories — figure out which section
  const ac=ACC[lift][phase];let idx=wuLen+wsLen+bs;
  for(const sec of ac){if(setIdx<idx+sec.ex.length)return sec.rt;idx+=sec.ex.length}
  return "isolation";
}
function tgSet(key,lift,si){
  dn[key]=!dn[key];save();
  // Auto-start timer when checking ON
  if(dn[key]){const rt=getRestType(lift,si);startTimer(rt,REST[rt])}
  rP();
}
function tgDay(key){dayDn[key]=!dayDn[key];save();rP()}
function isWkDn(wk){for(const l of L){if(!dayDn[l+"-"+wk])return false}return true}

// ===== AMRAP =====
function sA(lift,wk){const inp=document.getElementById("ai-"+lift+"-"+wk);if(!inp)return;const v=parseInt(inp.value);if(!v||v<1)return;amrap[lift+"-"+wk]={reps:v,date:new Date().toISOString()};save();rP()}

// ===== MAXES =====
function bM(){
  const c=document.getElementById("t-max");let h='<div class="box">Enter your <b>known 1RM</b> or <b>estimate</b> from reps. Weights auto-fill everywhere.</div>';
  L.forEach(l=>{
    const cl=LC[l],tm=gTM(l),m=md[l];
    h+=`<div class="lc" style="border:1px solid ${cl}33"><div class="lh"><div class="lb" style="background:${cl}"></div><span class="ln" style="color:${cl}">${LN[l]}</span><span class="ltm" id="tm-${l}" style="display:${mx[l]?"inline":"none"}">TM: <b>${tm}kg</b></span></div>`;
    h+=`<div class="mt"><button class="mb" style="border:1px solid ${m==="direct"?cl:"#334155"};color:${m==="direct"?cl:"#64748b"};background:${m==="direct"?cl+"22":"transparent"}" onclick="sMd('${l}','direct')">I know my 1RM</button><button class="mb" style="border:1px solid ${m==="estimate"?cl:"#334155"};color:${m==="estimate"?cl:"#64748b"};background:${m==="estimate"?cl+"22":"transparent"}" onclick="sMd('${l}','estimate')">Estimate</button></div>`;
    if(m==="direct"){h+=`<div class="ir"><label>1RM (kg):</label><input type=number inputmode=decimal placeholder="e.g. 140" value="${mx[l]}" oninput="sX('${l}',this.value)"></div>`}
    else{
      h+=`<div class="er"><div class="ec"><label>Weight (kg)</label><input type=number inputmode=decimal placeholder="100" value="${ei[l].w}" oninput="sE('${l}','w',this.value)"></div><div class="ec"><label>Reps</label><input type=number inputmode=numeric placeholder="8" value="${ei[l].r}" oninput="sE('${l}','r',this.value)"></div></div>`;
      const ev=ei[l].w&&ei[l].r?" → "+e1(parseFloat(ei[l].w),parseInt(ei[l].r))+"kg":"";
      h+=`<button class="cb" id="ca-${l}" style="background:linear-gradient(135deg,${cl},${cl}cc)" onclick="cE('${l}')">Calculate${ev}</button>`;
    }
    h+=`<div class="rt" id="rs-${l}" style="display:${mx[l]?"block":"none"}">1RM: <b>${mx[l]}kg</b> → TM: <b style="color:${cl}">${tm}kg</b></div></div>`;
  });
  h+=`<button class="gb${Object.values(mx).some(v=>v)?" s":""}" id="gob" onclick="sT('prog')">View Program →</button>`;
  c.innerHTML=h;
}
function sX(l,v){mx[l]=v;save();const tm=gTM(l),cl=LC[l],t=document.getElementById("tm-"+l),r=document.getElementById("rs-"+l);if(t){t.style.display=v?"inline":"none";t.innerHTML="TM: <b>"+tm+"kg</b>"}if(r){r.style.display=v?"block":"none";r.innerHTML='1RM: <b>'+v+'kg</b> → TM: <b style="color:'+cl+'">'+tm+'kg</b>'}const g=document.getElementById("gob");if(g)g.className="gb"+(Object.values(mx).some(x=>x)?" s":"")}
function sE(l,k,v){ei[l][k]=v;const b=document.getElementById("ca-"+l);if(b){const ev=ei[l].w&&ei[l].r?" → "+e1(parseFloat(ei[l].w),parseInt(ei[l].r))+"kg":"";b.textContent="Calculate"+ev}}
function sMd(l,m){md[l]=m;save();bM()}
function cE(l){const{w,r}=ei[l];const e=e1(parseFloat(w),parseInt(r));if(e>0){mx[l]=String(e);save();bM()}}

// ===== PROGRAM =====
function rP(){
  const c=document.getElementById("t-prog");let h="";
  const hm=Object.values(mx).some(v=>v);
  if(!hm)h+=`<div class="wrn" onclick="sT('max')">⚠ No maxes — tap to add</div>`;
  const allWk=isWkDn(0)&&isWkDn(1)&&isWkDn(2)&&isWkDn(3);
  h+=`<div class="phase">Phase <b>${phase+1}/3</b> · Cycle <b>${cycle+1}/3</b> — <span style="cursor:${allWk?"pointer":"not-allowed"};text-decoration:${allWk?"underline":"none"};opacity:${allWk?1:.4}" onclick="nxCy()">${allWk?"Next Cycle →":"🔒 Complete all weeks"}</span></div>`;
  h+='<div class="wt">';WL.forEach(([n,s],i)=>{
    const ul=i===0||isWkDn(i-1),d2=isWkDn(i);
    h+=`<button class="wb${i===aw?" on":""}" onclick="sW(${i})" style="${!ul?"opacity:.35;cursor:not-allowed":""}">${d2?"✅ ":""}${!ul?"🔒 ":""}${n}<span>${s}</span></button>`});h+='</div>';
  if(aw<3&&isWkDn(aw)){h+=`<div style="text-align:center;padding:7px;margin-bottom:8px;background:#10b98122;border:1px solid #10b98133;border-radius:6px;font-size:11px;color:#10b981;font-weight:600;cursor:pointer" onclick="sW(${aw+1})">✅ Week ${aw+1} done — unlock Week ${aw+2} →</div>`}
  DO.forEach(key=>{
    if(key==="rest"){h+=`<div class="dc"><div class="dh" style="cursor:default"><div class="dbr" style="background:#6b7280"></div><div class="di"><div>Sun — REST</div><div class="ds">Foam roll, stretch, walk</div></div></div></div>`;return}
    if(key.startsWith("cond")){
      const i=parseInt(key[4]),cd=CD[i],op=ed===key;
      let bd="";cd.sec.forEach(s=>{bd+=`<div class="st" style="color:${cd.col}">${s.t}</div>`;s.ex.forEach(ex=>{bd+=`<div class="ex" style="border-left:2px solid ${cd.col}33">${ex}</div>`})});
      h+=`<div class="dc" style="${op?"border-color:"+cd.col+"55":""}"><button class="dh" onclick="tD('${key}')"><div class="dbr" style="background:${cd.col}"></div><div class="di">${cd.day}</div><div class="da${op?" o":""}">▾</div></button><div class="db${op?" o":""}">${bd}</div></div>`;
      return;
    }
    const l=key,cl=LC[l],tm=gTM(l),ht=tm>0,ws=SC[aw],bp=aw===3?.40:.55,bs=aw===3?3:5,op=ed===l;
    const ts2=ws[ws.length-1],tw=pc(tm,ts2[0]),ak=l+"-"+aw,ca=amrap[ak],mD=dayDn[l+"-"+aw];
    let bd="",si=0;
    // Warm-up
    bd+=`<div class="st" style="color:#64748b">Warm-Up <span class="rh">— 60s</span></div>`;
    WU.forEach(([p,r])=>{const k=l+"-"+aw+"-"+si;const d=dn[k];bd+=`<div class="ex" style="border-left:2px solid #33415544"><span class="ck${d?" done":""}" onclick="tgSet('${k}','${l}',${si})">${d?"✓":""}</span>${ht?pc(tm,p)+"kg":Math.round(p*100)+"%"} × ${r}</div>`;si++});
    // Working
    bd+=`<div class="st" style="color:${cl}">Working — ${LN[l]} <span class="rh">— 3-5 min</span></div>`;
    ws.forEach(([p,r],j)=>{const isTop=j===ws.length-1;const k=l+"-"+aw+"-"+si;const d=dn[k];
      bd+=`<div class="ex w${isTop?" top":""}" style="border-left:2px solid ${cl}"><span class="ck${d?" done":""}" onclick="tgSet('${k}','${l}',${si})">${d?"✓":""}</span>${ht?'<b style="color:'+cl+'">'+pc(tm,p)+'kg</b>':Math.round(p*100)+"%"} × ${r}${isTop&&aw<3?'<span class="an">AMRAP</span>':""}</div>`;si++});
    // AMRAP logger
    if(aw<3){
      bd+=`<div class="al"><div class="ar"><label>AMRAP reps:</label><input class="ai" type=number inputmode=numeric id="ai-${l}-${aw}" placeholder="?" value="${ca?ca.reps:""}"><button class="as" style="background:${cl};color:#fff" onclick="sA('${l}',${aw})">${ca?"✓":"Save"}</button></div>`;
      const hist=[];for(let w=0;w<3;w++){const k2=l+"-"+w;if(amrap[k2])hist.push("W"+(w+1)+": <b>"+amrap[k2].reps+"</b>")}
      if(hist.length)bd+=`<div class="alog">${hist.join(" · ")}</div>`;
      bd+=`</div>`;
    }
    // BBB
    bd+=`<div class="st" style="color:#10b981">BBB <span class="rh">— 90s</span></div>`;
    for(let i=0;i<bs;i++){const k=l+"-"+aw+"-"+si;const d=dn[k];bd+=`<div class="ex" style="border-left:2px solid #10b98133"><span class="ck${d?" done":""}" onclick="tgSet('${k}','${l}',${si})">${d?"✓":""}</span>Set ${i+1}: 10 @ ${ht?"<b>"+pc(tm,bp)+"kg</b>":"50-60%"}</div>`;si++}
    // Accessories
    ACC[l][phase].forEach(sec=>{
      const restLabel={compound:"90-120s",isolation:"60-90s",core:"60s"}[sec.rt]||"60-90s";
      bd+=`<div class="st" style="color:#ec4899">${sec.t} <span class="rh">— ${restLabel}</span></div>`;
      sec.ex.forEach(ex=>{const k=l+"-"+aw+"-"+si;const d=dn[k];bd+=`<div class="ex" style="border-left:2px solid #ec489933"><span class="ck${d?" done":""}" onclick="tgSet('${k}','${l}',${si})">${d?"✓":""}</span>${ex}</div>`;si++});
    });
    // Day complete
    bd+=`<button style="width:100%;padding:10px;margin-top:8px;border:1px solid ${mD?"#10b981":"#334155"};border-radius:6px;background:${mD?"#10b98122":"transparent"};color:${mD?"#10b981":"#64748b"};font-size:11px;font-weight:600;cursor:pointer;font-family:inherit" onclick="tgDay('${l+"-"+aw}')">${mD?"✅ Day Complete!":"Mark Day Complete"}</button>`;

    h+=`<div class="dc" style="${op?"border-color:"+cl+"55":""}"><button class="dh" onclick="tD('${l}')"><div class="dbr" style="background:${cl}"></div><div class="di"><div>${DL[l]}</div><div class="ds">${ht?"Top: "+tw+"kg×"+ts2[1]:""}${ca?" · "+ca.reps+"reps":""}</div></div>${mD?'<span class="day-done">✅</span>':""}<div class="da${op?" o":""}">▾</div></button><div class="db${op?" o":""}">${bd}</div></div>`;
  });
  c.innerHTML=h;
}
function sW(i){if(i>0){for(let w=0;w<i;w++){if(!isWkDn(w))return}}aw=i;ed=null;rP()}
function tD(id){ed=ed===id?null:id;rP()}
function nxCy(){for(let w=0;w<4;w++){if(!isWkDn(w))return}cycle++;if(cycle>=3){cycle=0;phase=(phase+1)%3}dn={};dayDn={};aw=0;save();rP()}

// ===== LEGS =====
function bL(){
  const c=document.getElementById("t-legs");
  let h=`<div class="lgb"><h3>🦵 Leg Growth: +3 in/year</h3>`;
  LP.forEach(p=>{h+=`<div class="lp"><span>→</span><span>${p}</span></div>`});
  h+=`</div><div class="vb"><div class="vt">Weekly Volume</div>`;
  VD.forEach(([m,s,d])=>{h+=`<div class="vr"><span class="vm">${m}</span><span class="vd">${s} sets · ${d}</span></div>`});
  h+=`</div>`;c.innerHTML=h;
}

// ===== SERVICE WORKER =====
if('serviceWorker' in navigator){const sw=`self.addEventListener('install',e=>{self.skipWaiting()});self.addEventListener('activate',e=>{e.waitUntil(clients.claim())});self.addEventListener('fetch',e=>{e.respondWith(caches.match(e.request).then(r=>r||fetch(e.request).then(res=>{if(res.status===200){const c=res.clone();caches.open('531v4').then(cache=>cache.put(e.request,c))}return res}).catch(()=>new Response('Offline',{status:503}))))})`;navigator.serviceWorker.register(URL.createObjectURL(new Blob([sw],{type:'application/javascript'}))).catch(()=>{})}

// ===== INIT =====
load();acquireWL();bT();bM();rP();bL();rFB();
</script>
</body>
</html>
